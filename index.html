<!DOCTYPE html>
<html>
<head>
    <title>Now Playing Movie Poster</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <div id="poster"></div>

    <script>
        $(document).ready(function() {
            $.ajax({
                url: 'https://kodi:weeju20@192.168.0.154:8080/jsonrpc',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    "jsonrpc": "2.0",
                    "method": "Player.GetItem",
                    "params": { "properties": ["title"], "playerid": 1 },
                    "id": "libPlaying"
                }),
                success: function(data) {
                    var movieTitle = data.result.item.title;

                    $.ajax({
                        url: 'https://api.themoviedb.org/3/search/movie?api_key=500be8667da9edfdb162ea9a17d6bfd4&query=' + movieTitle,
                        type: 'GET',
                        success: function(data) {
                            var posterPath = data.results[0].poster_path;
                            $('#poster').html('<img src="https://image.tmdb.org/t/p/w500' + posterPath + '" />');
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
