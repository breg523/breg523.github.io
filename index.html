<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Poster Display</title>
    <style>
        #poster {
            max-width: 300px;
        }
    </style>
</head>

<body>
    <h1>Now Playing Movie Poster</h1>
    <div id="movieDetails">
        <p><strong>Movie Title:</strong> <span id="movieTitle"></span></p>
        <img src="" alt="Movie Poster" id="poster">
    </div>

    <script>
        const TMDB_API_KEY = '500be8667da9edfdb162ea9a17d6bfd4';
        const KODI_HOST = '192.168.1.154'; // Replace with the IP address or hostname of your Kodi instance
        const KODI_PORT = '8080'; // Replace with the correct port number for your Kodi JSON-RPC API
        const KODI_USERNAME = 'kodi';
        const KODI_PASSWORD = 'weeju';

        async function getNowPlayingMovie() {
            try {
                const response = await fetch(`http://${KODI_HOST}:${KODI_PORT}/jsonrpc`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa(`${KODI_USERNAME}:${KODI_PASSWORD}`),
                    },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        method: 'Player.GetItem',
                        params: {
                            playerid: 1, // Assuming playerid 1 corresponds to currently playing video
                            properties: ['title']
                        },
                        id: 1
                    }),
                });

                const data = await response.json();
                console.log('Now Playing Movie Response:', data); // Debugging console log
                return data.result.item.title;
            } catch (error) {
                console.error('Error getting now playing movie:', error);
                return null;
            }
        }

        async function getMoviePoster(movieTitle) {
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(movieTitle)}`);
                const data = await response.json();
                console.log('TMDB API Response:', data); // Debugging console log
                const posterPath = data.results[0].poster_path;
                const posterUrl = `https://image.tmdb.org/t/p/w500/${posterPath}`;
                return posterUrl;
            } catch (error) {
                console.error('Error getting movie poster:', error);
                return null;
            }
        }

        async function displayMoviePoster() {
            try {
                const movieTitle = await getNowPlayingMovie();
                if (movieTitle) {
                    document.getElementById('movieTitle').textContent = movieTitle;
                    const posterUrl = await getMoviePoster(movieTitle);
                    if (posterUrl) {
                        document.getElementById('poster').src = posterUrl;
                    } else {
                        console.error('Poster URL not found.');
                    }
                } else {
                    document.getElementById('movieDetails').textContent = 'No movie is currently playing.';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        window.onload = displayMoviePoster;
    </script>
</body>

</html>
