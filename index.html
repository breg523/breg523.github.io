<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Champions League Final at My House</title>
  <style>
    body { font-family: Arial, sans-serif; background: #181818; color: #fff; text-align: center; }
    .container { margin-top: 100px; }
    .hidden { display: none; }
    input, button { padding: 10px; margin: 10px; }
    .logo { font-size: 2em; font-weight: bold; margin-bottom: 30px; }
    .theme { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container" id="login">
    <div class="logo">🏆 Champions League Final</div>
    <div class="theme">Enter the password to join the ultimate football night!</div>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
    <div id="error" style="color: red;"></div>
  </div>

  <div class="container hidden" id="rsvp">
    <div class="logo">🎉 Welcome to the Final at My House!</div>
    <div class="theme">Will you be attending? Enter your name below:</div>
    <input type="text" id="name" placeholder="Your Name">
    <button onclick="submitName()">RSVP</button>
    <div id="thanks" style="color: #0f0;"></div>
  </div>

  <script>
    const PASSWORD = "final2025"; // Set your password here

    function checkPassword() {
      const input = document.getElementById('password').value;
      if (input === PASSWORD) {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('rsvp').classList.remove('hidden');
      } else {
        document.getElementById('error').innerText = "Incorrect password. Try again.";
      }
    }

    function submitName() {
      const name = document.getElementById('name').value;
      if (name.trim()) {
        document.getElementById('thanks').innerText = `Thanks, ${name}! See you at the final!`;
      }
    }
  </script>
</body>
</html>
